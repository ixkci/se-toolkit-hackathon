<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Fridge ❄️</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❄️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #cbd5e1; }
        
        /* Эффект "Глубина холодильника" */
        .fridge-inner {
            box-shadow: inset 10px 10px 30px rgba(0,0,0,0.05), inset -10px -10px 30px rgba(255,255,255,0.7);
            border-radius: 10px;
        }
        
        /* Стили Полок */
        .shelf {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(2px);
            border-bottom: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .shelf:hover { transform: translateX(5px); }

        /* ВАЖНО: Немного синий фон для важных продуктов */
        .shelf-urgent {
            background: rgba(219, 234, 254, 0.8) !important; /* light blue */
            border-bottom: 2px solid #93c5fd;
            box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.2);
        }

        /* Текст купленного товара */
        .bought-text { text-decoration: line-through; opacity: 0.5; }
        
        /* Имитация торца открытой двери */
        .fridge-door-edge {
            width: 30px;
            background: linear-gradient(to right, #ffffff, #f1f5f9);
            border-radius: 0 15px 15px 0;
            border-left: 2px solid #cbd5e1;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
        }

        /* Ручка на двери */
        .door-handle {
            width: 10px;
            height: 100px;
            background: #e2e8f0;
            border-radius: 5px;
            margin: 100px auto;
            border: 1px solid #cbd5e1;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.5), 2px 2px 5px rgba(0,0,0,0.05);
        }

        /* Анимация снежинки */
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
        .urgent-blink { animation: blink 1.2s infinite; display: inline-block; color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="flex bg-white max-w-lg w-full min-h-[80vh] rounded-[40px] border-8 border-white shadow-2xl overflow-hidden p-1">
        
        <div class="flex-1 p-6 bg-slate-50 fridge-inner flex flex-col">
            
            <div class="mb-8 border-b-2 border-blue-100 pb-4">
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic uppercase">
                    SHARED<span class="text-blue-500">FRIDGE</span>
                </h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    AI Managed Cooling System
                </p>
            </div>

            <form id="add-form" class="mb-6 space-y-3">
                <div class="flex gap-2">
                    <input type="text" id="item-name" placeholder="Add to shelf..." required
                        class="flex-1 p-3 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-300 transition-all shadow-sm">
                    <button type="submit" class="bg-slate-800 text-white px-6 rounded-xl hover:bg-slate-700 transition font-bold shadow-md">
                        ADD
                    </button>
                </div>
                <label class="flex items-center gap-2 text-xs font-black text-blue-600 cursor-pointer uppercase tracking-tighter w-max p-1 rounded-md hover:bg-blue-50">
                    <input type="checkbox" id="item-urgent" class="w-4 h-4 accent-blue-500">
                    ❄️ Super Cold (Important)
                </label>
            </form>

            <div class="mb-8 p-4 bg-blue-600 rounded-2xl shadow-xl shadow-blue-200 border-b-4 border-blue-800">
                <h2 class="text-[9px] font-black text-blue-100 uppercase mb-2 tracking-[0.2em]">AI Extraction Unit</h2>
                <div class="flex gap-2">
                    <input type="text" id="ai-prompt" placeholder="Ask AI: 'need milk and eggs'..." 
                        class="flex-1 p-2 bg-blue-500/50 border border-blue-400 rounded-lg text-white placeholder-blue-200 text-sm focus:outline-none">
                    <button onclick="askAI()" id="ai-btn" class="bg-white text-blue-600 px-4 py-1 rounded-lg font-bold hover:bg-blue-50 transition text-xs shadow-md">
                        MAGIC
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                <ul id="items-list" class="space-y-1">
                    </ul>
            </div>

        </div>

        <div class="fridge-door-edge shrink-0 flex flex-col items-center">
            <div class="door-handle"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://10.93.25.96:8000/items/';

        async function fetchItems() {
            try {
                const response = await fetch(API_URL);
                const items = await response.json();
                renderItems(items);
            } catch (e) { console.error("Fetch error", e); }
        }

        function renderItems(items) {
            const list = document.getElementById('items-list');
            list.innerHTML = ''; 

            items.forEach(item => {
                const li = document.createElement('li');
                const isUrgent = item.is_urgent && !item.is_bought;
                
                // ВАЖНО: Добавляем класс 'shelf-urgent', если продукт важный
                const urgentClass = isUrgent ? 'shelf-urgent' : '';
                
                li.className = `shelf flex items-center justify-between p-4 rounded-lg transition-all ${urgentClass}`;
                
                const textClass = item.is_bought ? 'bought-text italic' : 'font-semibold text-slate-700';
                const urgentMarker = isUrgent ? '<span class="urgent-blink mr-2">❄️</span>' : '';

                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden">
                        <input type="checkbox" ${item.is_bought ? 'checked' : ''} onchange="toggleItem(${item.id})" 
                            class="w-5 h-5 rounded-full border-2 border-slate-300 accent-blue-500 cursor-pointer shrink-0">
                        <span class="${textClass} text-lg truncate">${urgentMarker}${item.name}</span>
                    </div>
                    <div class="flex items-center gap-2 shrink-0 ml-2">
                        <button onclick="toggleUrgency(${item.id})" class="text-lg ${item.is_urgent ? 'opacity-100' : 'opacity-20'} hover:opacity-100 transition">❄️</button>
                        <button onclick="deleteItem(${item.id})" class="text-slate-300 hover:text-red-500 transition text-lg px-1">✕</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        async function askAI() {
            const promptInput = document.getElementById('ai-prompt');
            const btn = document.getElementById('ai-btn');
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            btn.innerText = "❄️...";
            btn.disabled = true;

            try {
                await fetch(`${API_URL}ai-extract`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                promptInput.value = '';
                fetchItems();
            } catch (e) { alert("Cooling system error!"); }
            finally { btn.innerText = "MAGIC"; btn.disabled = false; }
        }

        // Add, Toggle, Delete
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const n = document.getElementById('item-name');
            const u = document.getElementById('item-urgent');
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: n.value, is_urgent: u.checked })
            });
            n.value = ''; u.checked = false; fetchItems();
        });

        async function toggleItem(id) { await fetch(`${API_URL}${id}/toggle`, { method: 'PUT' }); fetchItems(); }
        async function toggleUrgency(id) { await fetch(`${API_URL}${id}/toggle-urgent`, { method: 'PUT' }); fetchItems(); }
        async function deleteItem(id) { if(confirm("Discard this item?")) { await fetch(`${API_URL}${id}`, { method: 'DELETE' }); fetchItems(); } }

        fetchItems();
    </script>
</body>
</html>
