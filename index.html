<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Fridge ❄️</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❄️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            padding: 32px 16px;
            background: #1c1f2e;
        }

        /* Kitchen wall */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.03) 60px),
                repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.03) 60px),
                linear-gradient(160deg, #1c1f2e 0%, #14172a 100%);
            z-index: 0;
        }

        .scene {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: stretch;
            filter: drop-shadow(-20px 20px 60px rgba(0,0,0,0.7));
        }

        /* ===== FRIDGE BODY ===== */
        .fridge-body {
            width: 420px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(170deg, #e2e8f0 0%, #cdd5de 50%, #bec8d4 100%);
            border-radius: 22px 22px 16px 16px;
            border: 4px solid #aab4c0;
            border-right: none;
            border-radius: 22px 0 0 16px;
            overflow: hidden;
            box-shadow:
                inset 3px 0 8px rgba(255,255,255,0.7),
                inset -3px 0 6px rgba(0,0,0,0.08);
        }

        /* ===== FREEZER ===== */
        .freezer {
            background: linear-gradient(180deg, #cdd7e3 0%, #bec9d5 100%);
            border-bottom: 4px solid #9aaab8;
            padding: 14px 20px 16px;
            flex-shrink: 0;
        }

        .freezer-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .freezer-title {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: #6a7a8a;
            text-transform: uppercase;
        }

        .temp-display {
            background: #1a2030;
            color: #7af0c8;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 5px;
            letter-spacing: 0.1em;
            font-family: monospace;
        }

        .freezer-handle {
            width: 100px;
            height: 9px;
            background: linear-gradient(180deg, #b0bcc8 0%, #909eac 50%, #b0bcc8 100%);
            border-radius: 5px;
            margin: 0 auto;
            border: 1px solid #7a8a98;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.5), 0 3px 6px rgba(0,0,0,0.25);
        }

        /* ===== INTERIOR ===== */
        .fridge-interior {
            flex: 1;
            background: linear-gradient(180deg, #eaf5ff 0%, #dff0ff 50%, #d8ecff 100%);
            margin: 10px 10px 10px 10px;
            border-radius: 10px;
            border: 1px solid #aacce8;
            overflow: hidden;
            box-shadow:
                inset 0 0 40px rgba(160,210,255,0.35),
                inset 0 -15px 30px rgba(130,190,240,0.15);
            display: flex;
            flex-direction: column;
        }

        /* Ceiling light strip */
        .ceiling-light {
            flex-shrink: 0;
            height: 22px;
            background: linear-gradient(180deg, #fffbe8 0%, rgba(255,251,232,0) 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-bottom: 1px solid rgba(240,210,80,0.2);
        }

        .light-bulb {
            width: 70px;
            height: 15px;
            background: linear-gradient(180deg, #fff8d0 0%, #ffe880 100%);
            border: 1px solid #d4b840;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 0 18px 4px rgba(255,220,60,0.4), 0 4px 20px rgba(255,200,0,0.3);
        }

        /* Add form */
        .add-section {
            flex-shrink: 0;
            padding: 10px 12px 10px;
            background: rgba(255,255,255,0.45);
            border-bottom: 1px solid rgba(160,205,240,0.5);
        }

        .add-row { display: flex; gap: 7px; }

        .add-row input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            background: rgba(255,255,255,0.92);
            border: 1.5px solid #a8cce8;
            border-radius: 9px;
            outline: none;
            color: #1e2e3e;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .add-row input[type="text"]:focus {
            border-color: #4a9fd4;
            box-shadow: 0 0 0 3px rgba(74,159,212,0.15);
        }

        .add-row input[type="text"]::placeholder { color: #88aac0; }

        .btn-add {
            padding: 8px 16px;
            background: #2a7fc4;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            letter-spacing: 0.06em;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-add:hover { background: #1a6faa; }
        .btn-add:active { transform: scale(0.97); }

        /* Scrollable shelves */
        .shelves-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px 10px;
        }

        .shelves-scroll::-webkit-scrollbar { width: 4px; }
        .shelves-scroll::-webkit-scrollbar-track { background: transparent; }
        .shelves-scroll::-webkit-scrollbar-thumb { background: rgba(100,160,210,0.3); border-radius: 4px; }

        /* Shelf group */
        .shelf-group { margin-bottom: 4px; }

        .shelf-header {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 5px 4px;
        }

        .shelf-icon { font-size: 13px; line-height: 1; }

        .shelf-title {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .shelf-count {
            margin-left: auto;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
        }

        /* Top shelf - urgent */
        .shelf-urgent .shelf-title { color: #2a6faa; }
        .shelf-urgent .shelf-icon { color: #2a8fd4; }
        .shelf-urgent .shelf-count { background: rgba(42,111,170,0.15); color: #2a6faa; }

        /* Middle shelf - normal */
        .shelf-normal .shelf-title { color: #4a7a5a; }
        .shelf-normal .shelf-icon { color: #5a9a6a; }
        .shelf-normal .shelf-count { background: rgba(74,122,90,0.15); color: #4a7a5a; }

        /* Bottom shelf - bought */
        .shelf-bought-section .shelf-title { color: #7a8898; }
        .shelf-bought-section .shelf-icon { color: #8a9aa8; }
        .shelf-bought-section .shelf-count { background: rgba(122,136,152,0.15); color: #7a8898; }

        .shelf-items {
            background: rgba(255,255,255,0.42);
            border-radius: 7px 7px 0 0;
            padding: 5px 5px 3px;
            min-height: 14px;
        }

        /* Glass shelf board */
        .shelf-board {
            height: 9px;
            background: linear-gradient(180deg,
                rgba(200,225,248,0.9) 0%,
                rgba(155,195,235,1) 45%,
                rgba(175,205,235,0.7) 100%);
            border-radius: 3px;
            border-top: 1.5px solid rgba(230,248,255,0.95);
            border-bottom: 2px solid rgba(90,140,195,0.4);
            box-shadow:
                0 4px 8px rgba(80,140,200,0.25),
                inset 0 1px 3px rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }

        /* Items */
        .item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 7px;
            border-radius: 7px;
            margin-bottom: 3px;
            border: 1px solid rgba(175,215,245,0.55);
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.68);
        }

        .item:last-child { margin-bottom: 0; }
        .item:hover { background: rgba(255,255,255,0.92); transform: translateX(3px); }

        .item.item-urgent {
            background: rgba(215,237,255,0.8);
            border-color: rgba(90,165,225,0.55);
        }

        .item.item-bought {
            background: rgba(235,238,242,0.5);
            border-color: rgba(195,205,215,0.35);
            opacity: 0.65;
        }

        .urgent-dot {
            width: 7px;
            height: 7px;
            background: #2a9fd4;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(42,159,212,0.5); }
            50% { opacity: 0.7; transform: scale(1.3); box-shadow: 0 0 0 4px rgba(42,159,212,0); }
        }

        .item-check {
            width: 15px;
            height: 15px;
            accent-color: #2a8fd4;
            cursor: pointer;
            flex-shrink: 0;
        }

        .item-name {
            flex: 1;
            font-size: 13px;
            color: #1e2e40;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item.item-bought .item-name {
            text-decoration: line-through;
            color: #8898a8;
            font-weight: 400;
        }

        .btn-urgent {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 2px 4px;
            border-radius: 5px;
            color: #b0c8dc;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .btn-urgent:hover { background: rgba(80,160,225,0.15); color: #5aabee; }
        .btn-urgent.on { color: #2a8fd4; }

        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 5px;
            color: #b8c8d8;
            transition: color 0.15s, background 0.15s;
            flex-shrink: 0;
        }

        .btn-delete:hover { color: #d04040; background: rgba(208,64,64,0.1); }

        .empty-shelf {
            text-align: center;
            padding: 10px 6px;
            color: #98b8cc;
            font-size: 11px;
            font-style: italic;
        }

        /* Veggie drawer at bottom */
        .veggie-drawer {
            flex-shrink: 0;
            margin: 0 10px 10px;
            background: linear-gradient(180deg, rgba(195,228,205,0.65) 0%, rgba(175,218,190,0.8) 100%);
            border-radius: 8px;
            border: 1px solid rgba(130,195,150,0.5);
            padding: 7px 10px 9px;
        }

        .veggie-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: #4a8a5a;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .veggie-placeholder {
            font-size: 11px;
            color: #7aaa8a;
            font-style: italic;
        }

        /* ===== DOOR PANEL ===== */
        .fridge-door {
            width: 32px;
            background: linear-gradient(180deg, #d5dfe8 0%, #c8d2dc 100%);
            border-radius: 0 18px 14px 0;
            border: 4px solid #aab4c0;
            border-left: 2px solid #c0cad4;
            box-shadow:
                8px 0 24px rgba(0,0,0,0.45),
                inset -3px 0 6px rgba(255,255,255,0.45),
                inset 2px 0 3px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            flex-shrink: 0;
        }

        .handle {
            width: 12px;
            height: 110px;
            background: linear-gradient(90deg, #8898a8 0%, #a0b0be 30%, #8898a8 100%);
            border-radius: 6px;
            border: 1px solid #6a7a88;
            box-shadow:
                inset 1px 1px 4px rgba(255,255,255,0.45),
                3px 3px 8px rgba(0,0,0,0.35);
        }

        .door-shelf {
            margin-top: 40px;
            width: 18px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

<div class="scene">
    <div class="fridge-body">

        <!-- Freezer -->
        <div class="freezer">
            <div class="freezer-top">
                <span class="freezer-title">❄ Freezer compartment</span>
                <span class="temp-display">-18°C</span>
            </div>
            <div class="freezer-handle"></div>
        </div>

        <!-- Interior -->
        <div class="fridge-interior">

            <div class="ceiling-light">
                <div class="light-bulb"></div>
            </div>

            <div class="add-section">
                <form id="add-form" class="add-row">
                    <input type="text" id="item-name" placeholder="Add item to fridge..." required>
                    <button type="submit" class="btn-add">+ ADD</button>
                </form>
            </div>

            <div class="shelves-scroll">

                <!-- TOP SHELF: urgent -->
                <div class="shelf-group shelf-urgent">
                    <div class="shelf-header">
                        <span class="shelf-icon">❄</span>
                        <span class="shelf-title">Top shelf — urgent</span>
                        <span class="shelf-count" id="count-urgent">0</span>
                    </div>
                    <div class="shelf-items">
                        <ul id="list-urgent"></ul>
                    </div>
                    <div class="shelf-board"></div>
                </div>

                <!-- MIDDLE SHELF: normal -->
                <div class="shelf-group shelf-normal">
                    <div class="shelf-header">
                        <span class="shelf-icon">🧺</span>
                        <span class="shelf-title">Middle shelf — to buy</span>
                        <span class="shelf-count" id="count-normal">0</span>
                    </div>
                    <div class="shelf-items">
                        <ul id="list-normal"></ul>
                    </div>
                    <div class="shelf-board"></div>
                </div>

                <!-- BOTTOM SHELF: bought -->
                <div class="shelf-group shelf-bought-section">
                    <div class="shelf-header">
                        <span class="shelf-icon">✓</span>
                        <span class="shelf-title">Bottom shelf — bought</span>
                        <span class="shelf-count" id="count-bought">0</span>
                    </div>
                    <div class="shelf-items">
                        <ul id="list-bought"></ul>
                    </div>
                    <div class="shelf-board"></div>
                </div>

            </div>

            <!-- Veggie drawer -->
            <div class="veggie-drawer">
                <div class="veggie-label">🥦 Vegetable drawer</div>
                <div class="veggie-placeholder">fruits &amp; vegetables</div>
            </div>

        </div>
    </div>

    <!-- Door -->
    <div class="fridge-door">
        <div class="handle"></div>
        <div class="door-shelf"></div>
    </div>
</div>

<script>
    // ЗАМЕНИ НА IP СВОЕЙ ВИРТУАЛКИ
    const API_URL = 'http://10.93.25.96:8000/items/';

    async function fetchItems() {
        try {
            const r = await fetch(API_URL);
            const items = await r.json();
            renderItems(items);
        } catch(e) { console.error('Fetch error', e); }
    }

    function makeItem(item) {
        const li = document.createElement('li');
        const isUrgent = item.is_urgent && !item.is_bought;
        
        // Проверяем, куплен ли товар
        const isBought = item.is_bought;
        
        li.className = 'item' + (isUrgent ? ' item-urgent' : '') + (isBought ? ' item-bought' : '');
        
        li.innerHTML = `
            ${isUrgent ? '<div class="urgent-dot"></div>' : ''}
            <input type="checkbox" class="item-check" ${isBought ? 'checked' : ''} onchange="toggleItem(${item.id})">
            <span class="item-name">${item.name}</span>
            
            <button class="btn-urgent ${item.is_urgent ? 'on' : ''}" 
                    onclick="${isBought ? '' : `toggleUrgency(${item.id})`}" 
                    ${isBought ? 'disabled' : ''} 
                    style="${isBought ? 'cursor: default; opacity: 0.3;' : ''}"
                    title="${isBought ? 'Cannot change urgency of bought items' : 'Mark urgent'}">
                ❄
            </button>
            
            <button class="btn-delete" onclick="deleteItem(${item.id})" title="Remove">✕</button>
        `;
        return li;
    }

    function setCount(id, n) {
        document.getElementById(id).textContent = n;
    }

    function renderItems(items) {
        const listUrgent  = document.getElementById('list-urgent');
        const listNormal  = document.getElementById('list-normal');
        const listBought  = document.getElementById('list-bought');

        listUrgent.innerHTML = '';
        listNormal.innerHTML = '';
        listBought.innerHTML = '';

        const urgent = items.filter(i => i.is_urgent && !i.is_bought);
        const normal = items.filter(i => !i.is_urgent && !i.is_bought);
        const bought = items.filter(i => i.is_bought);

        if (!urgent.length) listUrgent.innerHTML = '<li class="empty-shelf">No urgent items</li>';
        else urgent.forEach(i => listUrgent.appendChild(makeItem(i)));

        if (!normal.length) listNormal.innerHTML = '<li class="empty-shelf">Nothing here yet</li>';
        else normal.forEach(i => listNormal.appendChild(makeItem(i)));

        if (!bought.length) listBought.innerHTML = '<li class="empty-shelf">Nothing bought yet</li>';
        else bought.forEach(i => listBought.appendChild(makeItem(i)));

        setCount('count-urgent', urgent.length);
        setCount('count-normal', normal.length);
        setCount('count-bought', bought.length);
    }

    document.getElementById('add-form').addEventListener('submit', async e => {
        e.preventDefault();
        const n = document.getElementById('item-name');
        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: n.value, category: 'Other', is_urgent: false })
        });
        n.value = '';
        fetchItems();
    });

    async function toggleItem(id) {
        await fetch(`${API_URL}${id}/toggle`, { method: 'PUT' });
        fetchItems();
    }

    async function toggleUrgency(id) {
        await fetch(`${API_URL}${id}/toggle-urgent`, { method: 'PUT' });
        fetchItems();
    }

    async function deleteItem(id) {
        if (confirm('Remove this item?')) {
            await fetch(`${API_URL}${id}`, { method: 'DELETE' });
            fetchItems();
        }
    }

    fetchItems();
</script>
</body>
</html>
